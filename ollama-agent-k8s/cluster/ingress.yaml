apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ollama-ingress
  namespace: ollama-agent
  annotations:
    # ✅ Timeout settings (unchanged)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

    # ✅ Replaces: proxy_buffering off
    nginx.ingress.kubernetes.io/proxy-buffering: "off"

    # ✅ Replaces: proxy_http_version 1.1 + proxy_set_header Connection ''
    # Required for SSE (Server-Sent Events) / streaming responses from Ollama
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

    # ✅ Replaces: chunked_transfer_encoding on
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"

spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # ✅ Backend API — must come BEFORE / so it matches first
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ollama-backend-service
                port:
                  number: 5005

          # ✅ Frontend — catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ollama-frontend-service
                port:
                  number: 80